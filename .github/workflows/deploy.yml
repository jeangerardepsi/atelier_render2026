﻿
name: CI/CD Render

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear Docker auth
        run: |
          unset DOCKER_AUTH_CONFIG
          rm -f ~/.docker/config.json || true
          mkdir -p ~/.docker

      - name: Compute normalized names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          ACTOR=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          SERVICE_NAME="flask-render-iac-${ACTOR}"
          IMAGE_URL="ghcr.io/${OWNER}/flask-render-iac"
          IMAGE_TAG="${{ github.sha }}"

          echo "OWNER=${OWNER}" >> "$GITHUB_ENV"
          echo "ACTOR=${ACTOR}" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=${SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_URL=${IMAGE_URL}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

          echo "Using owner: ${OWNER}"
          echo "Using actor: ${ACTOR}"
          echo "Using service name: ${SERVICE_NAME}"
          echo "Using image: ${IMAGE_URL}:${IMAGE_TAG}"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          docker build -t "${IMAGE_URL}:${IMAGE_TAG}" .
          docker push "${IMAGE_URL}:${IMAGE_TAG}"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Delete existing Render service if present
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            https://api.render.com/v1/services)

          echo "Services returned by Render:"
          echo "$RESPONSE" | jq -r '.[] | select(type=="object" and .service != null) | .service.name'

          SERVICE_ID=$(echo "$RESPONSE" \
            | jq -r --arg NAME "$SERVICE_NAME" '
                .[]
                | select(type=="object" and .service != null)
                | select(.service.name == $NAME)
                | .service.id
              ' \
            | head -n 1)

          if [ -z "$SERVICE_ID" ] || [ "$SERVICE_ID" = "null" ]; then
            echo "No existing Render service named ${SERVICE_NAME}. Nothing to delete."
          else
            echo "Deleting existing Render service: ${SERVICE_NAME} (${SERVICE_ID})"
            curl -s -X DELETE \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${SERVICE_ID}"
          fi

      - name: Wait after delete
        run: sleep 10

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="render_api_key=${{ secrets.RENDER_API_KEY }}" \
            -var="render_owner_id=${{ secrets.RENDER_OWNER_ID }}" \
            -var="image_url=${IMAGE_URL}" \
            -var="image_tag=${IMAGE_TAG}" \
            -var="github_actor=${ACTOR}"
        working-directory: terraform
